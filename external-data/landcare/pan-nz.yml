external_data:
  pan_nz_draft:
    name: Protected Areas Network of New Zealand (PAN-NZ), 2026 (Draft)
    description: |-
      This dataset is compiled from publicly accessible and appropriately licensed protected area data. Not all known data sources have been included, and therefore this is not a complete version of PAN-NZ. Processing involves the identification and elimination of duplicates, but some may persist.

      In 2023 MfE commissioned a review of PAN-NZ because it was outdated and incomplete, making it unsuitable for policy and regulatory purposes. The review, which focused on the current state of the map and future directions, revealed data gaps and inconsistencies.

      As part of the pilot national land-use mapping contract, MWLR has carried out some improvements to PAN-NZ to address these identified issues. The completeness of the present protected areas layer reflects the availability of protected area data that are publicly accessible, appropriately licensed for reuse, and discoverable via a public API.

      Each protected area in the final layer includes an assigned IUCN category, where the associated legislation has previously been mapped to an IUCN category. Those that have unclear associations to IUCN categories are marked "Not Mapped" but are still included in the layer.
    license: https://creativecommons.org/licenses/by/4.0/
    attribution: # TODO
    external_data_type: wfs
    host: https://lris.scinfo.org.nz/services;key={key}/wfs
    key: LRIS_KEY
    layer: layer-124343
    geom_type: multipolygon
    derived_columns:
      - column: source_data
        datatype: text
        set_query: "'PAN-NZ'::TEXT"
      - column: source_date # Use date ranges if available, if both are null, then open lower limit but upper limit is data production date
        datatype: daterange
        set_query: |-
          (CASE
            WHEN source_start_date IS NOT NULL AND source_end_date IS NOT NULL
              THEN daterange(source_start_date::DATE, source_end_date::DATE, '[]')
            WHEN source_start_date IS NULL AND source_end_date IS NULL
              THEN daterange(NULL, '2025-04-15'::DATE, '(]')
            WHEN source_start_date IS NOT NULL
              THEN daterange(source_start_date::DATE, GREATEST(source_start_date::DATE, '2025-04-15'::DATE), '[]')
            WHEN source_end_date IS NOT NULL
              THEN daterange(LEAST(source_end_date::DATE, '2025-04-15'::DATE), source_end_date::DATE, '[]')
          END)
      - column: source_scale
        datatype: int4range
        set_query: "'[10,100]'::int4range"
      # Need some form of priority ranking to handle overlapping features
      # This list compiled from PAN-NZ then identifying all distinct remaining designations
      # Will need to be revised as PAN-NZ changes
      - column: priority_rank
        datatype: int
        set_query: |-
          array_position(
            ARRAY[
              -- Strictly protected / wilderness (IUCN Ib / Ia equivalent)
              'Wilderness Area',
              'Ruakituri Wilderness Area',
              'Nature Reserve',
              'Scientific Reserve',
              'Marine Reserve',
              'Hauraki Gulf Marine Reserve',
              'Marine Mammal Sanctuary',
              'Te Rohe o Te Whānau Puha Whale Sanctuary',
              'Wildlife Sanctuary',
              'Sanctuary Area',
              -- National / conservation parks (IUCN II equivalent)
              'National Park',
              'Conservation Park',
              'Conservation Park (former Forest Park)',
              -- International recognition
              'World Heritage Area',
              'Ramsar List site',
              'Ōhau New Zealand Fur Seal Sanctuary',
              -- National reserves and specific statutory protections
              'Specially Protected Area',
              'National Reserve',
              'Historic Reserve',
              'Te Urewera',
              'Ecological Area',
              'Faunistic Reserve',
              -- Scenic reserves
              'Scenic Reserve (a)',
              'Scenic Reserve (b)',
              -- Hauraki Gulf marine areas
              'Hauraki Gulf Marine Park',
              'Hauraki Gulf High Protection Area',
              'Hauraki Gulf Seafloor Protection Area',
              'Te Whata Kai o Rakihouia i Te Tai o Marokura – Kaikōura Marine Area',
              'Marine and Coastal Area',
              -- Wildlife management
              'Wildlife Refuge',
              'Wildlife Management Reserve',
              'Wildlife Management Area',
              -- Māori / cultural protections
              'Maori Reservation',
              'Māori Burial Ground',
              'Massey Burial-Ground',
              'Ngā Whenua Rāhui Kawenata',
              'Mātaitai Reserves and Taiāpure-Local Fisheries',
              -- Private / voluntary covenants
              'Conservation Covenant',
              'Open Space Covenant',
              'Protected Private Land',
              -- Conservation management
              'Conservation Purpose',
              -- Strips, easements, and lakes
              'Marginal Strip',
              'Esplanade Strip',
              'Lake Wānaka',
              'Lakes Manapouri and Te Anau',
              -- Regional and recreation
              'Waitangi Endowment Forest',
              'Regional Park',
              'Recreation Reserve',
              'Amenities Area',
              'Amenity Area',
              -- Government purpose and forests
              'Government Purpose Reserve',
              'Former State Forest Land',
              'Stewardship Area',
              'Wellington Town Belt',
              'Recreational Hunting Area',
              -- Management and regulatory
              'Management Agreement',
              'Significant Natural Area',
              'Water Conservation Reserve',
              'Local Purpose Reserve',
              -- Roads and rivers
              'Legal Road and Road Reserve',
              'Riverbed and Lakebed Protection',
              -- Low priority / specific purposes
              'Dog Area',
              'Racecourse',
              'Acquired for Public Works',
              'Land Held for a Government Work',
              'Crown Pastoral Lease',
              'Unoccupied Crown Land',
              'Consent Notice',
              'Crown Land Alienation',
              'Administration Purpose'
            ],
            designation
          )
    indices:
      - columns: [iucn_category]
        type: btree
        name: idx_btree_iucn_category
      - columns: [designation]
        type: btree
        name: idx_btree_designation
      - columns: [legislation_act]
        type: btree
        name: idx_btree_legislation_act
      - columns: [legislation_act, legislation_section]
        type: btree
        name: idx_btree_legislation_act_legislation_section
      - columns: [source_id]
        type: btree
        name: idx_btree_source_id
      - columns: [source_date]
        type: btree
        name: idx_btree_source_date
      - columns: [source_date, source_id]
        type: btree
        name: idx_btree_source_date_source_id
      - columns: [priority_rank]
        type: btree
        name: idx_btree_priority_rank