__gwrc__: &gwrc
  external_data_type: arcgis_rest
  license: CC BY 4.0
  attribution: Greater Wellington Regional Council

external_data:
  gwrc_plantation_forests_western: &gwrc_plantation_forests_western
    <<: *gwrc
    host: https://mapping.gw.govt.nz/arcgis/rest/services/GW/Parks_P/MapServer
    name: GWRC Plantation Forests (Western Area)
    description: Western Area Managed Plantation Forests
    geom_type: multipolygon
    layer: "16"
    derived_columns:
      - column: species_clean
        datatype: text[]
        set_query: |-
          NULLIF(
            ARRAY_REMOVE(
              ARRAY(
                SELECT CASE
                  WHEN token ~* 'P[\s\.]+rad'
                    THEN 'Pinus radiata'
                  WHEN token ~* 'C[\s\.]+mac'
                    THEN 'Cupressus macrocarpa'
                  WHEN token ~* 'Ps\.menz?'
                    THEN 'Pseudotsuga menziesii'
                  WHEN token ~* 'P\.contorta'
                    THEN 'Pinus contorta'
                  WHEN token ~* 'P\.nigra'
                    THEN 'Pinus nigra'
                  WHEN token ~* 'Euc(?:alypt(?:us)?)?\s*[.\s]spp'
                    THEN 'Eucalyptus spp.'
                  WHEN token ~* 'Acc?acia\s+mel'
                    THEN 'Acacia melanoxylon'
                  WHEN token ~* 'Pop'
                    THEN 'Populus spp.'
                  ELSE NULL
                END
                FROM unnest(regexp_split_to_array(species, '\s*/\s*')) AS token
              ),
              NULL
            ),
            ARRAY[]::text[]
          )
      - column: year_planted_clean
        datatype: integer
        set_query: |-
          (regexp_match(year_planted::text, '\d{4}'))[1]::integer
    indices:
      - columns: [species_clean]
        type: gin
        name: idx_gin_species_clean
      - columns: [year_planted_clean]
        type: btree
        name: idx_year_planted_clean
        
  gwrc_plantation_forests_eastern:
    <<: *gwrc_plantation_forests_western
    layer: "15"
    description: Eastern Area Managed Plantation Forests
    name: GWRC Plantation Forests (Eastern Area)

  gwrc_resource_consents:
    license: https://creativecommons.org/licenses/by/4.0/
    attribution: Greater Wellington Regional Council
    external_data_type: kart
    geom_type: point
    description: GWRC Resource Consents (LRIS 123385)
      # Active status is 'Granted' (not 'Current' — unique to GWRC).
      # Dairy shed effluent (~400 records): Purpose_Desc ~* '\bdairy shed effluent\b'
      # AND RC_APT_DESC = 'DP - ANIMAL WASTE TO LAND'.
    kart:
      host: kart@data.koordinates.com
      branch: main
      commit: '`git rev-list -n 1 --first-parent --before="2026-06-01 00:00" main`'
      remote: mwlcr/resource-consents
    layer: resource-consents
    indices:
      - columns: [RCstatus]
        type: btree
        name: idx_btree_rcstatus
      - columns: [RC_APT_DESC]
        type: btree
        name: idx_btree_rc_apt_desc
    derived_columns:
      - column: source_date
        datatype: daterange
        set_query: |-
          CASE
            WHEN commencement_date IS NULL OR commencement_date = ''
            THEN NULL::daterange
            WHEN GREATEST(
                TO_DATE(NULLIF("ElapsedDate", ''), 'DD/MM/YYYY'),
                TO_DATE(NULLIF("ExpiredDate", ''), 'DD/MM/YYYY')
            ) IS NULL
            THEN daterange(
                TO_DATE(commencement_date, 'DD/MM/YYYY'),
                TO_DATE(commencement_date, 'DD/MM/YYYY'),
                '[]'
            )
            WHEN TO_DATE(commencement_date, 'DD/MM/YYYY') > GREATEST(
                TO_DATE(NULLIF("ElapsedDate", ''), 'DD/MM/YYYY'),
                TO_DATE(NULLIF("ExpiredDate", ''), 'DD/MM/YYYY')
            )
            THEN NULL::daterange
            ELSE daterange(
                TO_DATE(commencement_date, 'DD/MM/YYYY'),
                GREATEST(
                    TO_DATE(NULLIF("ElapsedDate", ''), 'DD/MM/YYYY'),
                    TO_DATE(NULLIF("ExpiredDate", ''), 'DD/MM/YYYY')
                ),
                '[]'
            )
          END
      - column: source_data
        datatype: text
        set_query: "'GWRC consents'::TEXT"
      - column: source_scale
        datatype: int4range
        set_query: "'[1,200]'::int4range"