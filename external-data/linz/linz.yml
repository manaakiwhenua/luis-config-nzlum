__publisher_linz: &linz
  host: https://data.linz.govt.nz/services;key={key}/wfs
  key: LINZ_KEY
  external_data_type: wfs
  license: https://creativecommons.org/licenses/by/4.0/
  attribution: "Sourced from the LINZ Data Service and licensed for reuse under CC BY 4.0"

external_data:

  territorial_sea: &territorial_sea # Original table is curve polylines; replace with polygons
    <<: *linz
    description: LINZ 12 Mile Territorial Sea
    layer: layer-50846
    geom_type: multipolygon
    replace_table: |-
      WITH g AS (SELECT (ST_Dump(ST_BuildArea(ST_Union(ST_CurveToLine(geom))))).geom AS geom FROM :nln)
      SELECT ROW_NUMBER() OVER (ORDER BY g.geom) AS ogc_fid, g.geom
      FROM g

  territorial_sea_outlying_only: &territorial_sea_outlying_only
    <<: *territorial_sea
    description: LINZ 12 Mile Territorial Sea (Kermadec (/222), Antipodes (/3111), Bounty (/3111), Campbell (/3111), Auckland (/286), and Snares (/2411)
    where: |-
      \"bp1\" LIKE '%/222'
      OR \"bp1\" LIKE '%/3111'
      OR \"bp1\" LIKE '%/286'
      OR \"bp1\" LIKE '%/2411'

  regc2025_999: # Convenient alias for "everything else beyond StatsNZ's idea of everything else"
    <<: *territorial_sea_outlying_only

  railway_parcels:
    <<: *linz
    description: NZ Parcels (all cadastral parcel polygons) - current, primary, railway
    layer: layer-51571
    where: \"status\" = 'Current' AND \"topology_type\" = 'Primary' AND \"parcel_intent\" = 'Railway'
    geom_type: multipolygon

  road_parcels:
    <<: *linz
    description: NZ Parcels (all cadastral parcel polygons) - current, primary, road
    layer: layer-51571
    where: \"status\" = 'Current' AND \"topology_type\" = 'Primary' AND \"parcel_intent\" = 'Road'
    geom_type: multipolygon

  hydro_parcels:
    <<: *linz
    description: NZ Parcels (all cadastral parcel polygons) - current, primary, hydro
    layer: layer-51571
    where: \"status\" = 'Current' AND \"topology_type\" = 'Primary' AND \"parcel_intent\" = 'Hydro'
    geom_type: multipolygon

  nz_facilities:
    <<: *linz
    name: NZ Facilities
    description: NZ Facilities
    layer: layer-105588
    geom_type: multipolygon
    indices:
      - columns: [use]
        type: btree
        name: idx_use
      - columns: [use_type]
        type: btree
        name: idx_use_type
      - columns: [use_subtype]
        type: btree
        name: idx_use_subtype
  
  south_island_pastoral_leases:
    <<: *linz
    description: South Island Pastoral Leases
    layer: layer-51572
    geom_type: multipolygon
